name = "parrottalk-api"
main = "src/index.js"
compatibility_date = "2024-01-01"
workers_dev = true

[[kv_namespaces]]
binding = "RATE_KV"
id = "0da4e6df070a4012a69f941d2ed89eed"

[vars]
DAILY_LIMIT_PER_IP = "10"
MONTHLY_BUDGET_EUR = "50"
GEMINI_COST_PER_1K_INPUT_TOKENS = "0.0003"
GEMINI_COST_PER_1K_AUDIO_TOKENS = "0.001"
GEMINI_COST_PER_1K_OUTPUT_TOKENS = "0.0025"
# IP exemptées du quota DAILY_LIMIT_PER_IP, séparées par des virgules.
# Ne touche pas DAILY_LIMIT_PER_IP : la limite de 10 reste en place pour
# toutes les autres IP. Vérifier l'IP publique actuelle avec :
#   curl -s https://api.ipify.org
# Puis mettre à jour cette liste et redéployer :
#   npx wrangler deploy
EXEMPT_IPS = "62.147.81.43"
