name = "parrottalk-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "RATE_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[vars]
DAILY_LIMIT_PER_IP = "10"
MONTHLY_BUDGET_EUR = "50"
GEMINI_COST_PER_1K_INPUT_TOKENS = "0.0003"
GEMINI_COST_PER_1K_AUDIO_TOKENS = "0.001"
GEMINI_COST_PER_1K_OUTPUT_TOKENS = "0.0003"
