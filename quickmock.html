    /* Variante Quick Mock Test du page-hero. Meme systeme que les 4 modules (gradient
       pastel + bordure 3px), en violet : les 4 couleurs modules sont prises et le
       Quick Mock Test les traverse toutes, il lui faut sa propre identite.
       Le page-hero n'est pas decoratif : c'est lui qui porte
       padding-top: calc(var(--nav-h) + 40px), donc sans lui le contenu passe
       sous la barre de navigation qui est en position:fixed. */
    .page-hero.quick {
      background: linear-gradient(135deg, #DDD6FE 0%, #F5F3FF 100%);
      border-bottom: 3px solid #C4B5FD;
    }
    .badge-quick { background: #EDE9FE; color: #6D28D9; }

    /* Mascotte du Quick Mock Test : la fusee (vitesse, lancement). Ombre violette
       plutot que le bleu de .page-hero__mascot, pour rester dans l'identite de
       la page. Les bannieres du site (hero-rocket, hero-study) sont ecartees a
       dessein : elles portent du texte incruste, dont "100% FREE. FOREVER.". */
    .page-hero.quick .page-hero__mascot img {
      filter: drop-shadow(0 10px 28px rgba(109, 40, 217, .28));
    }

    /* Bandeau des 4 etapes. Present sur les 3 ecrans : le candidat voit toujours
       ou il en est et ce qu'il a deja obtenu. */
    .qm-steps { display: flex; gap: 10px; margin: 0 0 4px; }
    .qm-step {
      flex: 1; text-align: center; padding: 12px 6px; border-radius: var(--r);
      background: var(--white); color: var(--text-light);
      font-size: .8125rem; font-weight: 600;
      border: 1.5px solid var(--border); transition: all .2s;
    }
    .qm-step__icon { display: block; font-size: 1.25rem; margin-bottom: 3px; filter: grayscale(1); opacity: .35; }
    .qm-step.is-done {
      background: var(--success-light); color: var(--success-dark);
      border-color: var(--success); box-shadow: var(--sh-sm);
    }
    .qm-step.is-done .qm-step__icon { filter: none; opacity: 1; }
    .qm-step.is-current {
      background: var(--primary-pale); color: var(--primary-xdark);
      border-color: var(--primary); border-width: 2px; box-shadow: var(--sh);
      transform: translateY(-2px);
    }
    .qm-step.is-current .qm-step__icon { filter: none; opacity: 1; }
    .qm-step__band { display: block; font-size: 1rem; font-weight: 800; margin-top: 2px; }

    /* Pastilles de composition. */
    .qm-meta { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
    .qm-pill {
      background: var(--white); border: 1px solid var(--border); border-radius: var(--r-full);
      padding: 6px 14px; font-size: .8125rem; color: var(--text-muted); font-weight: 600;
      box-shadow: var(--sh-sm);
    }
    .qm-card { box-shadow: var(--sh-lg); border: 1px solid var(--border); }
    .qm-how {
      background: var(--surface); border: 1px solid var(--border-light);
      border-radius: var(--r); padding: 16px 20px; margin: 20px 0; text-align: left;
    }
    .qm-scope { color: var(--text-muted); font-size: 1rem; margin-top: 2px; }
    .qm-note { font-size: .8125rem; color: var(--text-light); margin-top: 14px; line-height: 1.6; }
    .qm-big-icon { font-size: 3.5rem; line-height: 1.1; margin-bottom: 4px; }

    @media (max-width: 640px) {
      .qm-steps { gap: 5px; }
      .qm-step { font-size: .6875rem; padding: 9px 3px; }
      .qm-step__icon { font-size: 1rem; }
      .qm-step.is-current { transform: none; }
    }

<script>
/* Hub du Quick Mock Test. Trois ecrans, pilotes par QuickMock.currentStep() :
 *   null                -> landing (le tirage a lieu au clic sur Start, pas avant)
 *   listening..speaking -> transition vers la tranche suivante
 *   done                -> synthese et band global estime
 *
 * Le hub ne rend aucune question et ne calcule aucun score : les moteurs
 * poussent leur resultat via QuickMock.recordResult(), le hub ne fait que lire.
 */

var QM = window.QuickMock;
var MIN = function (s) { return Math.round(s / 60); };

// Le total reel des tranches fait 52 min (8+20+20+4). La maquette validee annonce
// "About 50 min" : on arrondit a la dizaine plutot que d'ecrire 50 en dur, pour
// que le chiffre reste derive des durees reelles si elles bougent.
var TOTAL_MIN = function () {
  var s = QM.ORDER.reduce(function (n, m) { return n + QM.duration(m); }, 0);
  return Math.round(s / 60 / 10) * 10;
};

function readSeed() {
  var s = parseInt(new URLSearchParams(location.search).get('qmseed'), 10);
  return isFinite(s) ? s : null;
}

function fmt(b) { return (window.fmtBand ? window.fmtBand(b) : (typeof b === 'number' ? b.toFixed(1) : '-')); }

function stepsHTML(current) {
  var st = QM.get();
  var res = (st && st.results) || {};
  return '<div class="qm-steps">' + QM.ORDER.map(function (m) {
    var done = !!res[m];
    var cls = 'qm-step' + (done ? ' is-done' : (m === current ? ' is-current' : ''));
    return '<div class="' + cls + '">' +
      '<span class="qm-step__icon">' + QM.ICON[m] + '</span>' + QM.LABELS[m] +
      (done && typeof res[m].band === 'number' ? '<span class="qm-step__band">' + fmt(res[m].band) + '</span>' : '') +
    '</div>';
  }).join('') + '</div>';
}

// ── Hero, une variante par ecran ─────────────────────────────────────────────
function heroIdle() {
  return '<div class="flex items-center gap-3" style="margin-bottom:12px;flex-wrap:wrap">' +
      '<span class="badge badge-quick">⚡ New, only on ParrotTalk</span>' +
      '<span class="badge badge-dark">About ' + TOTAL_MIN() + ' minutes</span>' +
      '<span class="badge badge-free">Free</span>' +
    '</div>' +
    '<h1>Quick Mock Test</h1>' +
    '<p>All 4 sections, short version. Your band in under an hour.</p>' +
    '<div style="display:flex;gap:16px;margin-top:16px;flex-wrap:wrap">' +
      '<div style="font-size:.875rem;font-weight:600;color:var(--text-muted)">⚡ ONE SITTING · FOUR SKILLS · ONE ESTIMATED BAND</div>' +
    '</div>';
}

function heroStep(step) {
  var pos = QM.stepIndex(step);
  return '<div class="flex items-center gap-3" style="margin-bottom:12px;flex-wrap:wrap">' +
      '<span class="badge badge-quick">⚡ Quick Mock Test</span>' +
      '<span class="badge badge-primary">Step ' + pos + ' of ' + QM.ORDER.length + '</span>' +
      '<span class="badge badge-dark">About ' + MIN(QM.duration(step)) + ' minutes</span>' +
    '</div>' +
    '<h1>' + QM.ICON[step] + ' ' + QM.LABELS[step] + '</h1>' +
    '<p>' + QM.SCOPE[step] + '</p>';
}

function heroDone(overall) {
  return '<div class="flex items-center gap-3" style="margin-bottom:12px;flex-wrap:wrap">' +
      '<span class="badge badge-quick">⚡ Quick Mock Test</span>' +
      '<span class="badge badge-success">Complete</span>' +
    '</div>' +
    '<h1>' + (overall === null ? 'Your results' : 'Your estimated band') + '</h1>' +
    '<p>Four sections done in about ' + TOTAL_MIN() + ' minutes. Here is where you stand today.</p>';
}

// ── Ecran 1 : landing ────────────────────────────────────────────────────────
function renderIdle(zone) {
  document.getElementById('qm-hero').innerHTML = heroIdle();
  zone.innerHTML =
    '<div class="card card-lg qm-card" style="text-align:center">' +
      stepsHTML('listening') +
      '<div class="qm-meta">' +
        '<span class="qm-pill">🎧 One section</span>' +
        '<span class="qm-pill">📖 One passage</span>' +
        '<span class="qm-pill">✍️ Task 1</span>' +
        '<span class="qm-pill">🎤 Part 2</span>' +
      '</div>' +
      '<div class="qm-how">' +
        '<p style="font-size:.9375rem;color:var(--text);line-height:1.7">' +
          '<strong>How it works.</strong> We pick your four sections at random from our full tests, ' +
          'so each Quick Mock Test is different. You take them one after the other, then you get an ' +
          'estimated band. Everything is timed, like the real exam.' +
        '</p>' +
      '</div>' +
      '<button type="button" class="btn btn-primary btn-xl" onclick="startQuick()">Start Quick Mock Test →</button>' +
      '<p class="qm-note">' +
        'The estimate comes from a short test, so it is a snapshot of your current level, not an official IELTS score. ' +
        'For exam conditions, take the <a href="index.html" style="color:var(--primary)">Mock Test</a> instead.' +
      '</p>' +
    '</div>';
}

// ── Ecran 2 : transition ─────────────────────────────────────────────────────
function renderStep(zone, step) {
  document.getElementById('qm-hero').innerHTML = heroStep(step);
  var st = QM.get();
  var done = QM.ORDER.filter(function (m) { return st.results[m]; }).length;
  zone.innerHTML =
    '<div class="card card-lg qm-card" style="text-align:center">' +
      stepsHTML(step) +
      '<div class="qm-big-icon" style="margin-top:20px">' + QM.ICON[step] + '</div>' +
      '<div style="font-size:1.5rem;font-weight:800;color:var(--dark)">' + QM.LABELS[step] + '</div>' +
      '<p class="qm-scope">' + QM.SCOPE[step] + '</p>' +
      '<div class="qm-meta"><span class="qm-pill">⏱ About ' + MIN(QM.duration(step)) + ' min</span></div>' +
      '<a class="btn btn-primary btn-xl" style="margin-top:22px" href="' + QM.PAGES[step] + '?qm=1">' +
        (done === 0 ? 'Start ' : 'Continue to ') + QM.LABELS[step] + ' →' +
      '</a>' +
      '<div style="margin-top:12px"><button type="button" class="btn btn-ghost" onclick="QuickMock.stop()">Stop Quick Mock Test</button></div>' +
    '</div>';
}

// ── Ecran 3 : synthese ───────────────────────────────────────────────────────
// Le band global est une ESTIMATION : il repose sur une extrapolation de 10
// questions vers 40 cote Listening. L'etiquetage n'est pas cosmetique, c'est la
// seule chose qui rend ce chiffre defendable.
function renderDone(zone) {
  var st = QM.get();
  var res = st.results;
  var overall = QM.overallBand(res);
  var c = st.combo;
  document.getElementById('qm-hero').innerHTML = heroDone(overall);

  var heroHTML =
    '<div class="card card-sm fb-hero">' +
      '<div class="fb-hero__label">⚡ Quick Mock Test · Estimated Band</div>' +
      '<div class="fb-hero__band">' + (overall === null ? '-' : fmt(overall)) + '</div>' +
      '<div class="fb-hero__note">' +
        (overall === null
          ? 'Complete all four to see your estimated band.'
          : 'Estimate from a short test, not an official IELTS score.') +
      '</div>' +
    '</div>';

  // Classes reelles de css/main.css:446-457 : .score-val porte la couleur par
  // module (.score-card.listening .score-val), .score-label et .score-date sont
  // les seuls enfants stylees. Ne pas inventer de sous-classes ici : elles
  // seraient sans style.
  var cards = QM.ORDER.map(function (m) {
    var r = res[m];
    var detail = r && typeof r.raw === 'number' ? r.raw + '/' + r.max + ' correct' : QM.SCOPE[m];
    return '<div class="score-card ' + m + '">' +
      '<div class="score-val">' + (r ? fmt(r.band) : '-') + '</div>' +
      '<div class="score-label">' + QM.ICON[m] + ' ' + QM.LABELS[m] + '</div>' +
      '<div class="score-date">' + detail + '</div>' +
    '</div>';
  }).join('');

  var detailHTML =
    '<div class="score-grid" style="margin-top:16px">' + cards + '</div>' +
    '<div class="qm-how" style="margin-top:16px">' +
      '<div style="font-size:.8125rem;font-weight:700;color:var(--text-muted);margin-bottom:6px">What you took</div>' +
      '<p style="font-size:.875rem;color:var(--text-muted);line-height:1.7">' +
        '🎧 ' + c.listening.test + ', section ' + (c.listening.section + 1) + ' &middot; ' +
        '📖 ' + c.reading.test + ', passage ' + (c.reading.passage + 1) + ' &middot; ' +
        '✍️ Writing test ' + c.writing.test + ', Task 1 &middot; ' +
        '🎤 Speaking test ' + c.speaking.test + ', Part 2' +
      '</p>' +
    '</div>' +
    '<div style="margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">' +
      '<button type="button" class="btn btn-primary" onclick="restartQuick()">Take another Quick Mock Test</button>' +
      '<a class="btn btn-outline" href="dashboard.html">View Dashboard</a>' +
    '</div>';

  zone.innerHTML =
    '<div class="card card-lg qm-card">' +
      stepsHTML(null) +
      '<div id="qm-gate" style="margin-top:16px"></div>' +
      '<p class="qm-note" style="text-align:center">' +
        'A Quick Mock Test is short by design, so two attempts can differ by a band. ' +
        'For a result you can rely on, take the <a href="index.html" style="color:var(--primary)">Mock Test</a>.' +
      '</p>' +
    '</div>';

  // Un seul questionnaire pour tout le parcours, jamais un par tranche : c'est le
  // meme regime que le Full Mock, et le code est celui de FeedbackGate.
  var gate = document.getElementById('qm-gate');
  if (window.FeedbackGate && typeof window.FeedbackGate.render === 'function') {
    window.FeedbackGate.render(gate, {
      type: 'writing', testId: c.writing.test, band: overall,
      heroHTML: heroHTML, detailHTML: detailHTML,
    });
  } else {
    gate.innerHTML = heroHTML + detailHTML;
  }
}

// ── Actions ──────────────────────────────────────────────────────────────────
function startQuick() {
  QM.start(readSeed());
  location.href = QM.PAGES[QM.ORDER[0]] + '?qm=1';
}

function restartQuick() {
  QM.clear();
  startQuick();
}

function render() {
  var zone = document.getElementById('qm-zone');
  var step = QM.isActive() ? QM.currentStep() : null;
  if (!step) renderIdle(zone);
  else if (step === 'done') renderDone(zone);
  else renderStep(zone, step);
}

// DOMContentLoaded et pas un appel au parsing : feedback-gate.js est charge en
// `defer`, donc window.FeedbackGate et window.fmtBand n'existent pas encore
// pendant le parsing. C'est le piege dont speaking.html:1163 souffre deja, et
// que writing.html evite par ce meme moyen.
window.addEventListener('DOMContentLoaded', render);
</script>
